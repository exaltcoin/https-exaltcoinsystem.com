<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exalt Mining</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center}
.box{max-width:420px;margin:50px auto;padding:30px;background:#1b1b1b;border-radius:20px;box-shadow:0 0 30px orange}
h1{color:orange}
.circle{width:140px;height:140px;border:6px solid orange;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:bold}
button{width:100%;padding:14px;margin:6px 0;border:0;border-radius:10px;background:linear-gradient(90deg,orange,#ffb347);font-weight:bold;cursor:pointer}
#status{font-size:13px;margin-top:10px}
</style>

</head>

<body>

<div class="box">
<h1>Exalt Coin Mining</h1>

<p id="wallet">Wallet not connected</p>

<div class="circle" id="state">OFF</div>

<h2><span id="reward">0.000000</span> EXALT</h2>

<button onclick="connectWallet()">Connect Wallet</button>
<button onclick="startMining()">Start Mining</button>
<button onclick="claimReward()">Claim Reward</button>
<button onclick="stopMining()">Stop Mining</button>

<p id="status">Connect wallet first</p>
</div>

<script>

const CONTRACT = "0x08002d47650086196Eb966b33028b951fff20ADB";
const CHAIN = "0x38";

const ABI = [
 "function startMining() external",
 "function stopMining() external",
 "function claimReward() external",
 "function pendingReward(address) view returns(uint256)",
 "function isMining(address) view returns(bool)",
 "function lastUpdate(address) view returns(uint256)",
 "function rewardPerSecond() view returns(uint256)"
];

let provider, signer, contract, user;

async function connectWallet(){
 try{
  await window.ethereum.request({
   method:"wallet_switchEthereumChain",
   params:[{chainId:CHAIN}]
  });

  provider=new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);
  signer=await provider.getSigner();
  user=await signer.getAddress();

  contract=new ethers.Contract(CONTRACT,ABI,signer);

  document.getElementById("wallet").innerText=user;
  document.getElementById("status").innerText="Wallet connected";

  setInterval(update,3000);

 }catch(e){
  document.getElementById("status").innerText="Wallet error";
 }
}

async function update(){
 if(!contract) return;

 let mining=await contract.isMining(user);
 let pending=await contract.pendingReward(user);

 let total=pending;

 if(mining){
  let last=await contract.lastUpdate(user);
  let rate=await contract.rewardPerSecond();
  let now=Math.floor(Date.now()/1000);
  let diff=BigInt(now)-BigInt(last);
  total=BigInt(pending)+(diff*BigInt(rate));
 }

 document.getElementById("state").innerText=mining?"ON":"OFF";
 document.getElementById("reward").innerText=
 Number(ethers.formatUnits(total,18)).toFixed(6);
}

async function startMining(){
 try{
  let tx=await contract.startMining();
  await tx.wait();
  document.getElementById("status").innerText="Mining started";
 }catch(e){
  document.getElementById("status").innerText=
  e.toString().includes("Already")?"Already mining":"Error";
 }
}

async function claimReward(){
 try{
  let tx=await contract.claimReward();
  await tx.wait();
  document.getElementById("status").innerText="Reward claimed";
 }catch(e){
  document.getElementById("status").innerText="Claim failed";
 }
}

async function stopMining(){
 try{
  let tx=await contract.stopMining();
  await tx.wait();
  document.getElementById("status").innerText="Mining stopped";
 }catch(e){
  document.getElementById("status").innerText="Stop failed";
 }
}

</script>

</body>
</html>
