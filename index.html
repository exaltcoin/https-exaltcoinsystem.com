<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exalt Coin Mining</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

<style>
body{background:#111;color:white;font-family:Arial;text-align:center}
.box{max-width:430px;margin:50px auto;background:#1b1b1b;padding:30px;border-radius:20px;box-shadow:0 0 35px #ff6a00}
h1{color:#ff8c00}
.circle{width:150px;height:150px;border:6px solid #ff8c00;border-radius:50%;margin:25px auto;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:bold}
button{width:100%;padding:16px;margin:8px 0;border:0;border-radius:10px;background:linear-gradient(90deg,#ff6a00,#ffb000);font-weight:bold;cursor:pointer}
button:disabled{background:#555;color:white}
#status{font-size:14px;margin-top:15px}
</style>
</head>

<body>

<div class="box">
<h1>Exalt Coin Mining</h1>
<p id="walletText">Wallet not connected</p>

<div class="circle" id="stateText">OFF</div>

<h2><span id="rewardText">0.000000</span> EXALT</h2>

<button onclick="connectWallet()">Connect Wallet</button>
<button onclick="startMining()">Start Mining</button>
<button onclick="claimReward()">Claim Reward</button>
<button onclick="stopMining()">Stop Mining</button>

<p id="status">Please connect your wallet</p>
</div>

<script>
const MINING_CONTRACT = "0x08002d47650086196Eb966b33028b951fff20ADB";
const BSC_CHAIN_ID = "0x38";

const ABI = [
  "function startMining() external",
  "function stopMining() external",
  "function claimReward() external",
  "function pendingReward(address) view returns (uint256)",
  "function isMining(address) view returns (bool)"
];

let provider;
let signer;
let contract;
let userAddress;
let timer;

async function switchToBSC() {
  if (!window.ethereum) {
    alert("MetaMask install کریں");
    return;
  }

  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: BSC_CHAIN_ID }]
    });
  } catch (error) {
    if (error.code === 4902) {
      await window.ethereum.request({
        method: "wallet_addEthereumChain",
        params: [{
          chainId: BSC_CHAIN_ID,
          chainName: "BNB Smart Chain",
          nativeCurrency: {
            name: "BNB",
            symbol: "BNB",
            decimals: 18
          },
          rpcUrls: ["https://bsc-dataseed.binance.org/"],
          blockExplorerUrls: ["https://bscscan.com/"]
        }]
      });
    } else {
      throw error;
    }
  }
}

async function connectWallet() {
  try {
    await switchToBSC();

    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);

    signer = await provider.getSigner();
    userAddress = await signer.getAddress();

    contract = new ethers.Contract(MINING_CONTRACT, ABI, signer);

    document.getElementById("walletText").innerText =
      userAddress.slice(0, 6) + "..." + userAddress.slice(-4);

    document.getElementById("status").innerText = "Wallet connected";

    await checkMiningStatus();
    await updateReward();

    clearInterval(timer);
    timer = setInterval(updateReward, 3000);

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Wallet connect failed";
  }
}

async function checkMiningStatus() {
  if (!contract || !userAddress) return;

  try {
    const mining = await contract.isMining(userAddress);
    document.getElementById("stateText").innerText = mining ? "ON" : "OFF";
  } catch (err) {
    console.error(err);
  }
}

async function updateReward() {
  if (!contract || !userAddress) return;

  try {
    const reward = await contract.pendingReward(userAddress);
    document.getElementById("rewardText").innerText =
      Number(ethers.formatUnits(reward, 18)).toFixed(6);
  } catch (err) {
    console.error(err);
  }
}

async function startMining() {
  if (!contract) {
    alert("پہلے wallet connect کریں");
    return;
  }

  try {
    document.getElementById("status").innerText = "Starting mining...";
    const tx = await contract.startMining();
    await tx.wait();

    document.getElementById("stateText").innerText = "ON";
    document.getElementById("status").innerText = "Mining started";
    await updateReward();

  } catch (err) {
    console.error(err);
    if (String(err).includes("Already mining")) {
      document.getElementById("stateText").innerText = "ON";
      document.getElementById("status").innerText = "Mining already started";
    } else {
      document.getElementById("status").innerText = "Start mining failed";
    }
  }
}

async function claimReward() {
  if (!contract) {
    alert("پہلے wallet connect کریں");
    return;
  }

  try {
    document.getElementById("status").innerText = "Claiming reward...";
    const tx = await contract.claimReward();
    await tx.wait();

    document.getElementById("status").innerText = "Reward claimed";
    await updateReward();

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Claim failed";
  }
}

async function stopMining() {
  if (!contract) {
    alert("پہلے wallet connect کریں");
    return;
  }

  try {
    document.getElementById("status").innerText = "Stopping mining...";
    const tx = await contract.stopMining();
    await tx.wait();

    document.getElementById("stateText").innerText = "OFF";
    document.getElementById("status").innerText = "Mining stopped";
    await updateReward();

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Stop failed";
  }
}
</script>

</body>
</html>
