<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exalt Coin Mining</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

<style>
body{margin:0;background:#111;color:white;font-family:Arial;text-align:center}
.box{max-width:430px;margin:40px auto;background:#1b1b1b;padding:28px;border-radius:22px;box-shadow:0 0 35px orange}
h1{color:orange}
.circle{width:145px;height:145px;border:6px solid orange;border-radius:50%;margin:25px auto;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:bold}
button{width:100%;padding:15px;margin:8px 0;border:0;border-radius:12px;background:linear-gradient(90deg,#ff9800,#ffc04d);font-weight:bold;cursor:pointer}
#status{margin-top:12px;font-size:14px}
.small{font-size:12px;color:#ccc}
</style>
</head>

<body>

<div class="box">
<h1>Exalt Coin Mining</h1>
<p id="wallet">Wallet not connected</p>

<div class="circle" id="state">OFF</div>
<h2><span id="reward">0.000000</span> EXALT</h2>

<button onclick="connectWallet()">Connect Wallet</button>
<button onclick="connectWalletConnect()">Connect Trust/MetaMask Mobile</button>
<button onclick="startMining()">Start Mining</button>
<button onclick="claimReward()">Claim Reward</button>
<button onclick="stopMining()">Stop Mining</button>

<p id="status">Please connect wallet</p>
<p class="small">MetaMask, Trust Wallet, WalletConnect supported</p>
</div>

<script type="module">
import EthereumProvider from "https://esm.sh/@walletconnect/ethereum-provider@2.21.1";

const PROJECT_ID = "045db1fe4b635b1717c0b55c03472a29";
const CONTRACT = "0x08002d47650086196Eb966b33028b951fff20ADB";
const BSC_CHAIN_ID = "0x38";
const BSC_CHAIN_DECIMAL = 56;

const ABI = [
 "function startMining() external",
 "function stopMining() external",
 "function claimReward() external",
 "function pendingReward(address) view returns(uint256)",
 "function isMining(address) view returns(bool)",
 "function lastUpdate(address) view returns(uint256)",
 "function rewardPerSecond() view returns(uint256)"
];

let provider, signer, contract, user, timer, wcProvider;

function setStatus(msg){document.getElementById("status").innerText = msg;}

function getInjectedProvider(){
 if(window.ethereum?.providers){
   const mm = window.ethereum.providers.find(p => p.isMetaMask);
   const tw = window.ethereum.providers.find(p => p.isTrust);
   return mm || tw || window.ethereum.providers[0];
 }
 return window.ethereum;
}

async function switchToBSC(eth){
 try{
  await eth.request({method:"wallet_switchEthereumChain",params:[{chainId:BSC_CHAIN_ID}]});
 }catch(e){
  if(e.code === 4902){
   await eth.request({
    method:"wallet_addEthereumChain",
    params:[{
     chainId:BSC_CHAIN_ID,
     chainName:"BNB Smart Chain",
     nativeCurrency:{name:"BNB",symbol:"BNB",decimals:18},
     rpcUrls:["https://bsc-dataseed.binance.org/"],
     blockExplorerUrls:["https://bscscan.com/"]
    }]
   });
  }else{throw e;}
 }
}

async function setupEthers(eth){
 provider = new ethers.BrowserProvider(eth);
 signer = await provider.getSigner();
 user = await signer.getAddress();
 contract = new ethers.Contract(CONTRACT, ABI, signer);

 document.getElementById("wallet").innerText = user.slice(0,6)+"..."+user.slice(-4);
 setStatus("Wallet connected");

 await updateReward();
 clearInterval(timer);
 timer = setInterval(updateReward,3000);
}

window.connectWallet = async function(){
 try{
  const eth = getInjectedProvider();
  if(!eth){
   await window.connectWalletConnect();
   return;
  }
  await switchToBSC(eth);
  await eth.request({method:"eth_requestAccounts"});
  await setupEthers(eth);
 }catch(e){
  console.log(e);
  setStatus("Wallet connect failed");
 }
}

window.connectWalletConnect = async function(){
 try{
  wcProvider = await EthereumProvider.init({
   projectId: PROJECT_ID,
   chains: [BSC_CHAIN_DECIMAL],
   optionalChains: [BSC_CHAIN_DECIMAL],
   showQrModal: true,
   rpcMap: {56:"https://bsc-dataseed.binance.org/"},
   metadata:{
    name:"Exalt Coin Mining",
    description:"Exalt Coin Mining DApp",
    url:"https://exaltcoinsystem.com",
    icons:["https://exaltcoinsystem.com/favicon.ico"]
   }
  });

  await wcProvider.enable();
  await setupEthers(wcProvider);
 }catch(e){
  console.log(e);
  setStatus("WalletConnect failed");
 }
}

async function updateReward(){
 if(!contract || !user) return;

 try{
  const mining = await contract.isMining(user);
  const pending = await contract.pendingReward(user);
  let total = pending;

  if(mining){
   const last = await contract.lastUpdate(user);
   const rate = await contract.rewardPerSecond();
   const now = Math.floor(Date.now()/1000);
   const diff = BigInt(now) - BigInt(last);
   total = BigInt(pending) + diff * BigInt(rate);
  }

  document.getElementById("state").innerText = mining ? "ON" : "OFF";
  document.getElementById("reward").innerText =
   Number(ethers.formatUnits(total,18)).toFixed(6);
 }catch(e){console.log(e);}
}

window.startMining = async function(){
 if(!contract){alert("پہلے wallet connect کریں");return;}
 try{
  setStatus("Starting mining...");
  const tx = await contract.startMining();
  await tx.wait();
  setStatus("Mining started");
  await updateReward();
 }catch(e){
  console.log(e);
  setStatus(String(e).includes("Already") ? "Mining already ON" : "Start mining failed");
  await updateReward();
 }
}

window.claimReward = async function(){
 if(!contract){alert("پہلے wallet connect کریں");return;}
 try{
  setStatus("Claiming reward...");
  const tx = await contract.claimReward();
  await tx.wait();
  setStatus("Reward claimed");
  await updateReward();
 }catch(e){
  console.log(e);
  setStatus("Claim failed");
 }
}

window.stopMining = async function(){
 if(!contract){alert("پہلے wallet connect کریں");return;}
 try{
  setStatus("Stopping mining...");
  const tx = await contract.stopMining();
  await tx.wait();
  setStatus("Mining stopped");
  await updateReward();
 }catch(e){
  console.log(e);
  setStatus("Stop failed");
 }
}
</script>

</body>
</html>
